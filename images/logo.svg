<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" fill="none">
  <!-- DH Monogram Mark — geometric precision grid concept -->
  <g>
    <!-- D letterform with subtle grid/structure lines -->
    <path d="M4 6h10c8.5 0 15 6.5 15 18s-6.5 18-15 18H4V6z" stroke="#1B2A4A" stroke-width="2.2" fill="none"/>
    <!-- H letterform with crossbar accent -->
    <line x1="35" y1="6" x2="35" y2="42" stroke="#1B2A4A" stroke-width="2.2"/>
    <line x1="51" y1="6" x2="51" y2="42" stroke="#1B2A4A" stroke-width="2.2"/>
    <line x1="35" y1="24" x2="51" y2="24" stroke="#C9A84C" stroke-width="2.2"/>
    <!-- Precision grid accent — subtle horizontal rule through D -->
    <line x1="4" y1="24" x2="25" y2="24" stroke="#C9A84C" stroke-width="1.2" opacity="0.45"/>
  </g>
  <!-- Divider -->
  <line x1="64" y1="10" x2="64" y2="38" stroke="#E2E8F0" stroke-width="0.8"/>
  <!-- Text -->
  <text x="76" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14.5" font-weight="700" fill="#1B2A4A" letter-spacing="0.06em">DESIGNER HOMES</text>
  <text x="76" y="38" font-family="Inter, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#64748B" letter-spacing="0.14em">REAL ESTATE SERVICES</text>
</svg>